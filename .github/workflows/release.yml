# ─────────────────────────────────────────────────────────────
#  Release — push em develop ou tag v*
#  Gera IPA (ad-hoc se houver cert, unsigned se não) e publica
#  como artifact do run.
#  Sem Apple Developer: artifact sai como IPA não-assinado.
# ─────────────────────────────────────────────────────────────
name: Release

on:
  push:
    branches: [develop]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      bump:
        description: "Tipo de bump (patch/minor/major)"
        required: true
        default: "patch"
        type: choice
        options: [patch, minor, major]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  SCHEME: jobfinder
  CONFIGURATION: AdHoc
  CODE_SIGNING_ALLOWED: NO
  CODE_SIGNING_REQUIRED: NO
  LC_ALL: en_US.UTF-8
  LANG: en_US.UTF-8

jobs:
  # ─────────────────────────────────────────────────────────
  #  Gera IPA (unsigned default, ad-hoc se secrets existirem)
  # ─────────────────────────────────────────────────────────
  build-ipa:
    name: Build IPA
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # Versão derivada da tag (se for tag) ou do project.yml
      - name: Derive version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(grep '^[[:space:]]*MARKETING_VERSION:' project.yml | head -1 | sed -E 's/.*"(.*)"/\1/')
          fi
          BUILD=$(grep '^[[:space:]]*CURRENT_PROJECT_VERSION:' project.yml | head -1 | sed -E 's/.*"([0-9]+)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "📦 Building $VERSION ($BUILD)"

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-${{ runner.os }}-${{ hashFiles('**/*.swift', 'project.yml', '**/Package.swift') }}
          restore-keys: |
            derived-${{ runner.os }}-

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Cache Bundler
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: bundle-${{ runner.os }}-${{ hashFiles('**/Gemfile*') }}
          restore-keys: |
            bundle-${{ runner.os }}-

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # ── Tenta ad-hoc se houver certificado importado nos secrets
      - name: Import signing certificate (optional)
        if: env.P12_BASE64 != ''
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "CODE_SIGNING_REQUIRED=YES" >> $GITHUB_ENV
          echo "CODE_SIGNING_ALLOWED=YES" >> $GITHUB_ENV
          echo "✅ Cert importado — IPA sairá ad-hoc assinado."

      - name: Build (unsigned or ad-hoc)
        env:
          SCHEME: ${{ env.SCHEME }}
          CONFIGURATION: ${{ env.CONFIGURATION }}
          MARKETING_VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build }}
          CODE_SIGNING_ALLOWED: ${{ env.CODE_SIGNING_ALLOWED }}
          CODE_SIGNING_REQUIRED: ${{ env.CODE_SIGNING_REQUIRED }}
        run: |
          if [[ "$CODE_SIGNING_ALLOWED" == "YES" ]]; then
            echo "→ build_ipa (ad-hoc)"
            bundle exec fastlane ios build_ipa
          else
            echo "→ build_unsigned (no cert)"
            bundle exec fastlane ios build_unsigned
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: jobfinder-ipa-${{ steps.version.outputs.version }}-${{ steps.version.outputs.build }}
          path: build/jobfinder.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Attach IPA to release (tag runs only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "jobfinder ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: build/jobfinder.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────
  #  Bump + tag em develop → main (workflow_dispatch)
  # ─────────────────────────────────────────────────────────
  cut-release:
    name: Cut Release
    runs-on: macos-14
    needs: build-ipa
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/develop'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Cut release (Fastlane)
        env:
          BUMP_TYPE: ${{ inputs.bump }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bundle exec fastlane ios release
